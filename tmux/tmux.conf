# List of plugins
set-environment -g PATH "/opt/homebrew/bin:/bin:/usr/bin"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g visual-activity off

# Undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -g mouse on
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g renumber-windows on
set -g set-clipboard on
set -g status-position bottom
set -g base-index 1

set -gq allow-passthrough on
set -g visual-activity off

bind-key -r f run-shell "tmux neww ~/.config/tmux/tmux-sessionizer"
bind-key -r T run-shell "~/.config/ghostty/bin/theme-toggle"


if-shell '[ -f ~/.cache/alzeck/theme/tmux.conf ]' 'source-file ~/.cache/alzeck/theme/tmux.conf' 'set -g @catppuccin_flavor "mocha"'
set -g @catppuccin_status_background "none"

set -g @catppuccin_window_status_style "none"

# Foreground-only session module (keep Catppuccin colors, no filled blocks)
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_module_bg_color "default"
set -g @catppuccin_status_session_icon_bg "default"
set -g @catppuccin_status_session_text_bg "default"
set -g @catppuccin_status_session_icon_fg "#{@thm_green}"
set -g @catppuccin_status_session_text_fg "#{@thm_green}"
set -g @catppuccin_session_icon ""
set -g @catppuccin_session_text "#S"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left "  "


set -g @plugin 'catppuccin/tmux#v2.1.3'
run '~/.tmux/plugins/tpm/tpm'

# Apply final status/window styling after Catppuccin is loaded by TPM.
set -gF status-style "fg=#{@thm_fg},bg=default"
set -g status-right "#{E:@catppuccin_status_session}  "

set -g window-status-separator "  "
set -g window-status-format "#I #W"
set -g window-status-current-format "#I #W"
set -gF window-status-style "fg=#{@thm_overlay_1},bg=default"
set -gF window-status-current-style "fg=#{@thm_mauve},bold,bg=default"
set -gF window-status-activity-style "fg=#{@thm_yellow},bg=default"
set -gF window-status-bell-style "fg=#{@thm_red},bold,bg=default"
